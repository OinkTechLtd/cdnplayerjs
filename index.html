<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
	<head>
		<title></title> 
        <script src='playerjs.js' type='text/javascript'></script>
       <script type="text/javascript" src="jquery.min.js"></script>
<style>
body{margin:0;}
.htm {
width: 100%!important;
height: 100%!important;
}
.banr {
	position: fixed;
    left: 50px;
    top: 50px;
    z-index: 2000000005;
    width: 600px;
    height: 300px;
    overflow: visible;
	display:none;
	
	
}
.krs {
	height: 23px;
    line-height: 23px;
    width: 23px;
    visibility: visible;
    position: absolute;
    left: -15px;
    top: -10px;
    cursor: pointer;
    z-index: 100500;
}
.ban468 {
    position: fixed;
    left: 50px;
    top: 100px;
    z-index: 2000000005;
    width: 550px;
    height: 96px;
    overflow: visible;
    background: #ffffff;
	
}
</style>

	</head>
	<body>
    <style>
        html,body{
            margin:0;padding:0;width:100%;height:100%;
        }
    </style>
        
    <div id="playerjs" style="width:100%;height:100%;"></div>
        
    <script type="text/javascript">
            
        var ps = location.href.substr(location.href.indexOf("html?")+5).split("&");
            
        var vs = {id:"playerjs"};
            
        for(var i = 0; i<ps.length; i++){
            var p = ps[i].substr(0,ps[i].indexOf("="));
            var v = ps[i].substr(ps[i].indexOf("=")+1);
            if(p!=v){
                vs[p] = decodeURIComponent(v);
            }
        }
            
        var playerjs = new Playerjs(vs);
            
    </script>
</body>
</html>
