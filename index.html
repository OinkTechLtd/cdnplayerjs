<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CDNPlayerJS</title>
  <script src="playerjs.js" type="text/javascript"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #090b13;
      color: #f5f8ff;
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }
    body.embed .layout {
      display: block;
    }
    body.embed .panel {
      display: none;
    }
    body.embed #player-wrap {
      padding: 0;
    }
    body.embed #playerjs {
      height: 100vh;
      border-radius: 0;
    }
    .panel {
      border-right: 1px solid #1f2638;
      padding: 16px;
      background: #101522;
    }
    .panel h1 { margin: 0 0 12px; font-size: 20px; }
    .hint { font-size: 12px; color: #9bb0d8; margin: 0 0 14px; }
    label { display: block; font-size: 13px; margin: 10px 0 6px; color: #c8d5f0; }
    input, textarea {
      width: 100%;
      border: 1px solid #28324d;
      border-radius: 8px;
      background: #080d18;
      color: #fff;
      padding: 10px;
      font-size: 14px;
    }
    textarea { min-height: 98px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    button {
      width: 100%;
      background: #3d7bff;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary { background: #1b2338; }
    .status {
      min-height: 38px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #273557;
      background: #0c1324;
      padding: 10px;
      font-size: 12px;
      color: #b7c8eb;
      white-space: pre-wrap;
    }
    #player-wrap { padding: 16px; }
    #playerjs { width: 100%; height: calc(100vh - 32px); background: #000; border-radius: 12px; overflow: hidden; }
    .small { font-size: 12px; color: #9fb2d8; margin-top: 10px; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid #1f2638; }
      #playerjs { height: 56vh; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>CDNPlayerJS</h1>
      <p class="hint">Поддержка: прямые ссылки (.m3u8, .mp4 и т.д.), плейлисты .m3u/.txt и зашифрованные ссылки.</p>

      <label for="streamInput">Ссылка на поток или плейлист</label>
      <input id="streamInput" placeholder="https://example.com/live.m3u8" />

      <label for="secretInput">Ключ шифрования (AES-GCM)</label>
      <input id="secretInput" value="cdnplayerjs" />

      <div class="row">
        <button id="playBtn">Запустить</button>
        <button id="encryptBtn" class="secondary">Сгенерировать ссылку</button>
      </div>

      <label for="encryptedOutput">Зашифрованная ссылка</label>
      <textarea id="encryptedOutput" readonly placeholder="Тут появится ссылка"></textarea>

      <div class="status" id="status">Готово к запуску.</div>
      <div class="small">Можно открыть страницу с <code>?src=...</code>, <code>?file=...</code> или <code>#enc=...</code>.</div>
    </aside>

    <main id="player-wrap">
      <div id="playerjs"></div>
    </main>
  </div>

  <script>
    let playerInstance = null;

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    function base64UrlEncode(bytes) {
      let str = '';
      bytes.forEach((b) => { str += String.fromCharCode(b); });
      return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function base64UrlDecode(input) {
      const padded = input.replace(/-/g, '+').replace(/_/g, '/') + '='.repeat((4 - input.length % 4) % 4);
      const raw = atob(padded);
      return Uint8Array.from(raw, (c) => c.charCodeAt(0));
    }

    async function getAesKey(secret) {
      const data = new TextEncoder().encode(secret.trim());
      const digest = await crypto.subtle.digest('SHA-256', data);
      return crypto.subtle.importKey('raw', digest, 'AES-GCM', false, ['encrypt', 'decrypt']);
    }

    async function encryptText(plainText, secret) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await getAesKey(secret);
      const encoded = new TextEncoder().encode(plainText);
      const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
      const merged = new Uint8Array(iv.length + cipher.byteLength);
      merged.set(iv, 0);
      merged.set(new Uint8Array(cipher), iv.length);
      return base64UrlEncode(merged);
    }

    async function decryptText(token, secret) {
      const bytes = base64UrlDecode(token);
      const iv = bytes.slice(0, 12);
      const data = bytes.slice(12);
      const key = await getAesKey(secret);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
      return new TextDecoder().decode(plain);
    }

    function safeTitle(title, index) {
      const cleaned = (title || `Канал ${index + 1}`).replace(/[\[\],]/g, ' ').trim();
      return cleaned || `Канал ${index + 1}`;
    }

    function parsePlaylistText(text) {
      const lines = text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      const entries = [];
      let pendingTitle = '';

      for (const line of lines) {
        if (line.startsWith('#EXTINF')) {
          pendingTitle = line.includes(',') ? line.split(',').slice(1).join(',').trim() : '';
          continue;
        }

        if (line.startsWith('#')) {
          continue;
        }

        if (/^https?:\/\//i.test(line)) {
          entries.push({ title: pendingTitle, url: line });
          pendingTitle = '';
          continue;
        }

        if (line.includes('|')) {
          const [title, url] = line.split('|');
          if (/^https?:\/\//i.test((url || '').trim())) {
            entries.push({ title: title.trim(), url: url.trim() });
          }
        } else if (line.includes(',')) {
          const [title, url] = line.split(',');
          if (/^https?:\/\//i.test((url || '').trim())) {
            entries.push({ title: title.trim(), url: url.trim() });
          }
        }
      }

      return entries;
    }

    function resolveUrl(baseUrl, value) {
      try {
        return new URL(value, baseUrl).toString();
      } catch (_) {
        return value;
      }
    }

    function hasPlaylistContent(raw) {
      return raw.includes('#EXTM3U') || raw.includes('#EXTINF') || /https?:\/\//i.test(raw);
    }

    function parsePlaylistFromInput(rawInput, baseUrl) {
      const entries = parsePlaylistText(rawInput);
      return entries
        .map((entry, index) => `[${safeTitle(entry.title, index)}]${resolveUrl(baseUrl, entry.url)}`)
        .join(',');
    }

    async function resolveSource(inputUrl) {
      const trimmed = inputUrl.trim();

      if (hasPlaylistContent(trimmed) && !/^https?:\/\//i.test(trimmed)) {
        const fromInput = parsePlaylistFromInput(trimmed, window.location.href);
        if (!fromInput) {
          throw new Error('Плейлист из поля ввода пустой или неверного формата.');
        }
        return fromInput;
      }

      const isPlaylist = /\.(m3u8?|txt)(\?|#|$)/i.test(trimmed);
      if (!isPlaylist || /\.m3u8(\?|#|$)/i.test(trimmed)) {
        return trimmed;
      }

      if (!/^https?:\/\//i.test(trimmed)) {
        return inputUrl;
      }

      const response = await fetch(trimmed);
      if (!response.ok) {
        throw new Error(`Не удалось загрузить плейлист (${response.status})`);
      }

      const text = await response.text();
      const entries = parsePlaylistText(text);
      if (!entries.length) {
        throw new Error('Плейлист пустой или неверного формата.');
      }

      return entries
        .map((entry, index) => `[${safeTitle(entry.title, index)}]${entry.url}`)
        .join(',');
    }

    function createPlayer(fileSource) {
      const container = document.getElementById('playerjs');
      container.innerHTML = '';

      playerInstance = new Playerjs({
        id: 'playerjs',
        file: fileSource,
        autoplay: 1,
        poster: ''
      });
    }

    async function startPlayback(raw) {
      if (!raw) {
        setStatus('Укажи ссылку на поток или плейлист.');
        return;
      }

      setStatus('Загрузка источника...');
      try {
        const fileSource = await resolveSource(raw.trim());
        createPlayer(fileSource);
        setStatus('Поток запущен. Если это .m3u/.txt, каналы собраны в плейлист PlayerJS.');
      } catch (error) {
        setStatus(`Ошибка: ${error.message}`);
      }
    }

    async function initFromUrl() {
      const query = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const source = query.get('src') || query.get('file') || query.get('stream');
      const sourceEmbedRequested = (() => {
        if (!source || !/^https?:\/\//i.test(source)) {
          return false;
        }

        try {
          const sourceUrl = new URL(source);
          return sourceUrl.searchParams.get('embed') === '1';
        } catch (_) {
          return false;
        }
      })();

      const isEmbed = query.get('embed') === '1' || hash.get('embed') === '1' || sourceEmbedRequested;

      if (isEmbed) {
        document.body.classList.add('embed');
      }

      const enc = hash.get('enc') || query.get('enc');
      const key = hash.get('k') || query.get('k') || document.getElementById('secretInput').value;

      if (source) {
        document.getElementById('streamInput').value = source;
        startPlayback(source);
        return;
      }

      if (enc) {
        try {
          const json = await decryptText(enc, key);
          const payload = JSON.parse(json);
          const src = payload.stream || '';
          document.getElementById('streamInput').value = src;
          setStatus('Ссылка расшифрована. Запускаю поток...');
          startPlayback(src);
        } catch (error) {
          setStatus(`Не удалось расшифровать ссылку: ${error.message}`);
        }
      }
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      startPlayback(document.getElementById('streamInput').value);
    });

    document.getElementById('encryptBtn').addEventListener('click', async () => {
      const stream = document.getElementById('streamInput').value.trim();
      const secret = document.getElementById('secretInput').value.trim();
      if (!stream) {
        setStatus('Сначала укажи поток для шифрования.');
        return;
      }

      try {
        const payload = JSON.stringify({ stream, ts: Date.now() });
        const token = await encryptText(payload, secret || 'cdnplayerjs');
        const url = `${window.location.origin}${window.location.pathname}?embed=1#enc=${encodeURIComponent(token)}&k=${encodeURIComponent(secret || 'cdnplayerjs')}`;
        document.getElementById('encryptedOutput').value = url;
        setStatus('Готово: зашифрованная ссылка создана. Это URL в режиме "только плеер".');
      } catch (error) {
        setStatus(`Ошибка шифрования: ${error.message}`);
      }
    });

    initFromUrl();
  </script>
</body>
</html>
